name: budget_manager
description: "Track expenses, set budgets, and manage your money with complete offline privacy."
publish_to: 'none'

version: 3.8.0+9

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.0
  fl_chart: ^1.1.1
  sqflite: ^2.4.2
  path: ^1.9.1
  math_expressions: ^3.1.0
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  shared_preferences: ^2.2.0
  animated_splash_screen: ^1.3.0
  uuid: ^4.5.1
  google_generative_ai: ^0.4.0
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  google_sign_in: ^6.2.1
  connectivity_plus: ^6.1.0
  http: ^1.2.1

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  page_transition: ^2.2.1
  flutter_native_splash: ^2.4.6
  url_launcher: ^6.3.2
  smooth_page_indicator: ^2.0.1
  lottie: ^3.3.2
  showcaseview: ^5.0.1
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_icons:
    android: true
    ios: false
    image_path: "assets/icons/logo.png"
    adaptive_icon_foreground: "assets/icons/logo.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
     - assets/lottie/
     - assets/icons/logo.png
     - assets/icons/splash.jpg
